<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لو لا؟</title>
  <style>
    * { box-sizing: border-box; font-family: Tahoma, Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ffe1ec, #ffc6d9 45%, #ff9ec0);
      overflow: hidden;
    }
    .card {
      width: min(92vw, 620px);
      background: rgba(255,255,255,0.92);
      border-radius: 28px;
      padding: 34px 22px;
      text-align: center;
      box-shadow: 0 20px 55px rgba(0,0,0,0.18);
      position: relative;
      z-index: 2;
      transition: 0.4s ease;
    }
    h1 {
      margin: 0 0 32px;
      color: #2b2b2b;
      font-size: clamp(24px, 6vw, 34px);
      line-height: 1.7;
    }
    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      min-height: 90px;
    }
    button {
      border: 0;
      border-radius: 20px;
      padding: 16px 36px;
      font-size: 25px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.32s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #yesBtn {
      background: #ff3f86;
      color: white;
      transform: scale(1);
      box-shadow: 0 10px 25px rgba(255,63,134,.35);
      z-index: 5;
    }
    #noBtn {
      background: #f1f1f1;
      color: #333;
      transform: scale(1);
      z-index: 4;
    }
    .result {
      display: none;
      width: min(92vw, 720px);
      text-align: center;
      position: relative;
      z-index: 10;
      animation: pop .45s ease;
    }
    .result img {
      max-width: 100%;
      max-height: 78vh;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,.22);
      background: #000;
    }
    .result h2 {
      color: #fff;
      text-shadow: 0 3px 10px rgba(0,0,0,.35);
      font-size: clamp(24px, 6vw, 38px);
      margin: 0 0 18px;
    }
    @keyframes pop {
      from { transform: scale(.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>تتراجع عن قرارڪ و تبطل زعل لو لا؟</h1>
    <div class="buttons">
      <button id="yesBtn">أي</button>
      <button id="noBtn">لا</button>
    </div>
  </div>

  <div class="result" id="result">
    <h2>عرفت تختار صح ❤️</h2>
    <img src="result.png" alt="صورة النتيجة">
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const card = document.getElementById("card");
    const result = document.getElementById("result");

    let yesScale = 1;
    let noScale = 1;

    noBtn.addEventListener("click", () => {
      yesScale += 0.45;
      noScale = Math.max(0.18, noScale - 0.13);

      yesBtn.style.transform = `scale(${yesScale})`;
      noBtn.style.transform = `scale(${noScale})`;

      if (yesScale >= 4) {
        yesBtn.style.position = "fixed";
        yesBtn.style.inset = "0";
        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";
        yesBtn.style.borderRadius = "0";
        yesBtn.style.fontSize = "clamp(70px, 18vw, 170px)";
        yesBtn.style.zIndex = "999";
        noBtn.style.opacity = "0";
        noBtn.style.pointerEvents = "none";
      }
    });

    yesBtn.addEventListener("click", () => {
      card.style.display = "none";
      result.style.display = "block";
      document.body.style.background = "linear-gradient(135deg, #ff8fab, #ffc2d1)";
      document.body.style.overflow = "auto";
    });
  </script>
</body>
</html>
